name: CI/CD Pipelines

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pipelines.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pipelines.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates (web)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build project
        run: npm run build

      - name: Install Playwright browser + deps
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke

      - name: Upload smoke-test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-artifacts-${{ github.run_id }}
          retention-days: 7
          path: |
            web/playwright-report
            web/test-results

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    # Trigger on push to main or pull_request
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request')
    
    env:
      # Determine if this is a production or preview deployment
      IS_PROD: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      # Format environment for Vercel CLI
      VERCEL_ENV: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'production' || 'preview' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Pull Vercel Environment Information
        run: |
          npx vercel pull --yes \
            --environment=$VERCEL_ENV \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./web

      - name: Build Project Artifacts
        run: |
          npx vercel build \
            ${{ env.IS_PROD == 'true' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./web

      - name: Deploy Project Artifacts to Vercel
        run: |
          npx vercel deploy --prebuilt \
            ${{ env.IS_PROD == 'true' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./web

